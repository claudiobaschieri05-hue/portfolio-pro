<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Claudio Baschieri</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Reset e base */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
html, body{height:100%; margin:0; padding:0; scroll-behavior:smooth;}
body{background:#f9f9f9;color:#222;line-height:1.6;}

/* Navbar */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;z-index:1000;background:rgba(0,0,0,0.8);transition:background 0.3s;}
nav.scrolled{background:#111;}
nav ul{list-style:none;display:flex;gap:2rem;}
nav ul li a{color:white;text-decoration:none;transition:color 0.3s;}
nav ul li a:hover{color:#ff4081;}
.hamburger{display:none;flex-direction:column;cursor:pointer;gap:5px;}
.hamburger div{width:25px;height:3px;background:white;transition:all 0.3s;}
@media screen and (max-width:768px){
nav ul{position:fixed;top:0;right:-100%;height:100vh;width:60%;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center;gap:2rem;transition:right 0.4s ease-in-out;z-index:999;}
nav ul.show{right:0;}
.hamburger{display:flex;}
}
.hamburger.active div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.active div:nth-child(2){opacity:0;}
.hamburger.active div:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* Hero */
.hero{
  min-height:100vh; /* riempie tutta la viewport */
  display:flex; justify-content:center; align-items:center;
  text-align:center;
  position:relative;
  color:white;
  background:url('https://images.unsplash.com/photo-1581091215365-84f245998bbd?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
  background-attachment:fixed;
  margin-top:0;
  padding-top:0;
}
.hero::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.6);}
.hero-content{position:relative;z-index:1;}
.hero-content h1{font-size:3rem;animation:slideFadeIn 1.5s ease-out forwards;}
.hero-content p{font-size:1.3rem;margin-bottom:1.5rem;animation:slideFadeIn 2s ease-out forwards;}
.btn{padding:0.8rem 2rem;border-radius:50px;color:white;text-decoration:none;background:linear-gradient(45deg,#ff4081,#ff8c00,#ff4081);background-size:200% 200%;animation:gradientMove 5s ease infinite, slideFadeIn 2.5s ease-out forwards;transition: transform 0.3s, box-shadow 0.3s;display:inline-block;}
.btn:hover{transform:scale(1.1) rotate(-1deg);box-shadow:0 5px 20px rgba(255,64,129,0.4);}

/* Animazioni */
@keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes slideFadeIn{0%{opacity:0;transform:translateY(50px);}100%{opacity:1;transform:translateY(0);}}

/* Sections */
section{padding:6rem 2rem;text-align:center;opacity:0;transform:translateY(20px);transition:opacity 1s ease, transform 1s ease;}
section.active-section{opacity:1;transform:translateY(0);}
section h2, section p{opacity:0;transform:translateY(20px);transition:all 1s ease-out;}
section.active-section h2, section.active-section p{opacity:1;transform:translateY(0);}
section{scroll-margin-top:80px;} /* compenso navbar fixed */

/* About Section */
.about{background:#f4f4f4;max-width:900px;margin:auto;text-align:left;}
.about h2{text-align:center;margin-bottom:2rem;font-size:2.5rem;}
.about p{margin-bottom:1rem;font-size:1.1rem;}

/* Skills */
.skills{background:#fff;max-width:900px;margin:auto;margin-top:2rem;padding:2rem;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.skills h3{text-align:center;margin-bottom:1rem;font-size:2rem;}
.skills ul{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;list-style:none;}
.skills ul li{background:#ff4081;color:white;padding:0.5rem 1rem;border-radius:5px;font-weight:700;}

/* Featured Projects */
.featured-projects{background:#f9f9f9; padding:6rem 2rem; max-width:1200px; margin:auto;}
.featured-projects h2{text-align:center; margin-bottom:3rem; font-size:2.5rem;}
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;}
.project-card{background:white;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.1);overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;}
.project-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.project-card img{width:100%;height:180px;object-fit:cover;}
.project-card .content{padding:1rem;}
.project-card h3{margin-bottom:0.5rem;}
.project-card p{font-size:0.95rem;color:#555;margin-bottom:0.5rem;}
.project-card a{text-decoration:none;color:#ff4081;font-weight:700;transition:color 0.3s;}
.project-card a:hover{color:#e73370;}

/* Gallery Section */
.gallery h2{margin-bottom:2rem;}
.slider{position:relative;max-width:900px;margin:auto;overflow:hidden;border-radius:10px;}
.slides img{width:100%;display:none;cursor:pointer;transition:transform 0.5s, box-shadow 0.5s;}
.slides img.active{display:block;}
.slides img:hover{transform:scale(1.12) rotate(-1deg);box-shadow:0 10px 30px rgba(255,64,129,0.6);}
.prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:white;border:none;padding:1rem;cursor:pointer;border-radius:50%;transition:background 0.3s;}
.prev{left:10px;} .next{right:10px;}
.prev:hover,.next:hover{background:#ff4081;}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:2000;}
#lightbox img{max-width:90%;max-height:90%;border-radius:10px;}

/* Contact Section */
.contact{background:#f4f4f4;}
.contact h2{text-align:center;margin-bottom:2rem;font-size:2rem;}
.contact form{max-width:500px;margin:auto;display:flex;flex-direction:column;gap:1rem;}
.contact input,.contact textarea{padding:0.8rem;border:1px solid #ccc;border-radius:5px;}
.contact button{padding:1rem;border:none;border-radius:50px;background:linear-gradient(45deg,#ff4081,#ff8c00,#ff4081);background-size:200% 200%;animation:gradientMove 5s ease infinite;color:white;cursor:pointer;transition: transform 0.3s, box-shadow 0.3s;}
.contact button:hover{transform:scale(1.1) rotate(-1deg);box-shadow:0 5px 20px rgba(255,64,129,0.4);}

/* Footer */
footer{text-align:center;padding:2rem;background:#222;color:white;}
footer .socials{margin-top:1rem;display:flex;justify-content:center;gap:1rem;}
footer .social-icon{font-size:1.5rem;color:white;transition:transform 0.3s, color 0.3s;}
footer .social-icon:hover{transform:scale(1.3);color:#ff4081;}

/* Scroll-top button */
#scrollTopBtn{position:fixed;bottom:40px;right:40px;z-index:999;background:#ff4081;color:white;border:none;padding:0.8rem 1rem;border-radius:50%;font-size:1.5rem;cursor:pointer;display:none;box-shadow:0 5px 20px rgba(255,64,129,0.4);transition: transform 0.3s, background 0.3s;}
#scrollTopBtn:hover{transform:scale(1.2);background:#e73370;}
</style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar">
  <div class="logo">Claudio Baschieri</div>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
  <ul id="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#about">Chi Sono</a></li>
    <li><a href="#skills">Competenze</a></li>
    <li><a href="#projects">Progetti</a></li>
    <li><a href="#gallery">Galleria</a></li>
    <li><a href="#contact">Contatti</a></li>
  </ul>
</nav>

<!-- Hero -->
<section id="home" class="hero">
  <div class="hero-content">
    <h1>Claudio Baschieri</h1>
    <p>Programmatore & Automazione | Informatica Applicata</p>
    <a href="#about" class="btn">Scopri di più</a>
  </div>
</section>
